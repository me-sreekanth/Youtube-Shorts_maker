name: Daily YouTube Shorts Upload

on:
  schedule:
    # Run every day at 09:00 UTC (Adjust if needed)
    - cron: '0 9 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write # Needed to commit and push deletions

jobs:
  upload-videos:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create YouTube Web Credentials (youtube-web.json)
        env:
          YOUTUBE_WEB_JSON: ${{ secrets.YOUTUBE_WEB_JSON }}
        run: |
          if [ -n "$YOUTUBE_WEB_JSON" ]; then
            echo "$YOUTUBE_WEB_JSON" > youtube-web.json
            echo "✅ Created youtube-web.json"
          else
            echo "⚠️ YOUTUBE_WEB_JSON secret is not set!"
          fi

      - name: Create YouTube Token (.youtube_token.json)
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          if [ -n "$YOUTUBE_TOKEN_JSON" ]; then
            echo "$YOUTUBE_TOKEN_JSON" > .youtube_token.json
            echo "✅ Created .youtube_token.json"
          else
            echo "⚠️ YOUTUBE_TOKEN_JSON secret is not set!"
          fi

      - name: Run Daily Auto Upload
        env:
          # Optional: If you use Pollinations or Deepgram API keys, set them here
          # DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/daily_auto_upload.py

      - name: Commit and Push Changes
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add any deleted files from input/daily
          git add -u input/daily/
          
          # If there are changes to commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto: Delete processed JSONs [skip ci]"
            git push
            echo "✅ Changes committed and pushed successfully."
          else
            echo "ℹ️ No changes to commit. Proceeding..."
          fi
